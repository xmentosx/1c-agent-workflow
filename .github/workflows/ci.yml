name: CI

on:
  push:
  pull_request:

jobs:
  static:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          $pester = Get-Module -ListAvailable Pester |
            Where-Object { $_.Version -ge [version]"5.0.0" } |
            Sort-Object Version -Descending |
            Select-Object -First 1
          if (-not $pester) {
            Install-Module Pester -MinimumVersion 5.0.0 -Scope CurrentUser -Force -SkipPublisherCheck
          }

      - name: Run Pester
        shell: pwsh
        run: |
          .\scripts\test.ps1 -CI -OutputFile .\build\test-results\pester\testResults.xml

      - name: Helper help
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\.agents\skills\1c-workflow\scripts\agent-1c.ps1 -Action help

      - name: Check whitespace
        shell: pwsh
        run: git diff --check

      - name: Ensure tests do not modify tracked files
        shell: pwsh
        run: git diff --exit-code
